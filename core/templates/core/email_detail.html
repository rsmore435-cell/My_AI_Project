{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Email - QuickReach</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="background-color: #f6f8fa;">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary mb-3">
                &larr; Back to Dashboard
            </a>

            <div class="card shadow-sm border-0 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                    <div>
                        <h4 class="fw-bold mb-1">Email to {{ email.recipient_name }}</h4>
                        <p class="text-muted mb-0">{{ email.company_name }} &bull; {{ email.created_at|date:"M d, Y" }}</p>
                    </div>
                    <span class="badge bg-primary">{{ email.tone }} Tone</span>
                </div>

                <div class="p-4 bg-light rounded border">
                    <p style="white-space: pre-wrap; font-family: 'Courier New', monospace;">{{ email.generated_content }}</p>
                </div>

                <div class="mt-4 text-end">
                    <button class="btn btn-primary" onclick="navigator.clipboard.writeText('{{ email.generated_content|escapejs }}')">
                        Copy to Clipboard
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
